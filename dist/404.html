<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        :root {
            --bg-pink: #fff5f7;
            --main-pink: #ffdae3;
            --dark-pink: #ff85a1;
            --accent: #ffb3c1;
            --white: #ffffff;
            --shadow: rgba(255, 133, 161, 0.2);
            --code-bg: #fffcfd;
            --j-blue: #bde0fe;
            /* Added a soft blue for contrast */
            --max-width: 800px;
        }

        body {
            background-color: var(--bg-pink);
            /* Changed to a cuter heart pattern */
            background-image: radial-gradient(#ffc2d1 0.5px, transparent 0.5px),
                radial-gradient(#ffc2d1 0.5px, #fff5f7 0.5px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            font-family: 'Quicksand', 'M PLUS Rounded 1c', sans-serif;
        }

        .container {
            max-width: 500px;
            padding: 40px;
        }

        /* Styling the image */
        .error-image {
            width: 100%;
            max-width: 300px;
            /* Adjust size as needed */
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin: 10px 0;
            color: #2d3436;
        }

        p {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            text-decoration: none;
            background-color: #0984e3;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            display: inline-block;
        }

        .btn:hover {
            background-color: #74b9ff;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Your image is placed here -->
        <img src="404.png" alt="404 Error - Page Not Found" class="error-image">

        <h1>Lost in Space?</h1>
        <p>We can't seem to find the page you're looking for. It might have been moved or deleted.</p>

        <a href="https://jihoo12.github.io" class="btn">Back to Home</a>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>badge</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="sakura-fall" style="left:10%; animation-delay:0s">🌸</div>
    <div class="sakura-fall" style="left:30%; animation-delay:2s">🌸</div>
    <div class="sakura-fall" style="left:50%; animation-delay:4s">✨</div>
    <div class="sakura-fall" style="left:70%; animation-delay:1s">🌸</div>
    <div class="sakura-fall" style="left:90%; animation-delay:3s">🎀</div>
    <div class="container">
        <div class="badges">
            <img src="https://img.shields.io/badge/Rust-black?style=for-the-badge&logo=rust&logoColor=E57324"
                alt="Rust">
            <img src="https://img.shields.io/badge/Python-3776AB?style=for-the-badge&logo=python&logoColor=white"
                alt="Python">
            <img src="https://img.shields.io/badge/C-00599C?style=for-the-badge&logo=c&logoColor=white" alt="C">
            <img src="https://img.shields.io/badge/C%2B%2B-00599C?style=for-the-badge&logo=c%2B%2B&logoColor=white"
                alt="C++">
            <img src="https://img.shields.io/badge/OCaml-EC6847?style=for-the-badge&logo=ocaml&logoColor=white"
                alt="OCaml">
            <br>
            <img src="https://img.shields.io/badge/LLVM-white?style=for-the-badge&logo=llvm&logoColor=434343"
                alt="LLVM">
            <img src="https://img.shields.io/badge/UEFI-0054FF?style=for-the-badge&logo=intel&logoColor=white"
                alt="UEFI">
            <img src="https://img.shields.io/badge/Git-F05032?style=for-the-badge&logo=git&logoColor=white" alt="Git">
            <br>
            <img src="https://img.shields.io/badge/Ubuntu-E95420?style=for-the-badge&logo=ubuntu&logoColor=white"
                alt="Ubuntu">
            <img src="https://img.shields.io/badge/Arch_Linux-1793D1?style=for-the-badge&logo=arch-linux&logoColor=white"
                alt="Arch">
            <img src="https://img.shields.io/badge/Gentoo-54487A?style=for-the-badge&logo=gentoo&logoColor=white"
                alt="Gentoo">
        </div>
    </div>
</body>

</html>

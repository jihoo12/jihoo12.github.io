<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>badge</title>
    <style>
        :root {
            --bg-pink: #fff0f3;
            --main-pink: #ffc2d1;
            --dark-pink: #ff85a1;
            --white: #ffffff;
            --shadow: rgba(255, 133, 161, 0.2);
        }

        body {
            background-color: var(--bg-pink);
            background-image: radial-gradient(#ffc2d1 0.8px, transparent 0.8px);
            background-size: 20px 20px;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .sakura-fall {
            position: fixed;
            top: -10%;
            pointer-events: none;
            z-index: 0;
            animation: fall 8s linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
        img {
            margin: 5px;
            transition: transform 0.3s ease;
            border-radius: 8px;
        }

        img:hover {
            transform: scale(1.2) rotate(5deg); /* Pops out when hovered! */
        }
    </style>
</head>
<body>
    <div class="sakura-fall" style="left:10%; animation-delay:0s">🌸</div>
    <div class="sakura-fall" style="left:30%; animation-delay:2s">🌸</div>
    <div class="sakura-fall" style="left:50%; animation-delay:4s">✨</div>
    <div class="sakura-fall" style="left:70%; animation-delay:1s">🌸</div>
    <div class="sakura-fall" style="left:90%; animation-delay:3s">🎀</div>
    <div class="badges">
        <img src="https://img.shields.io/badge/Rust-black?style=for-the-badge&logo=rust&logoColor=E57324" alt="Rust">
        <img src="https://img.shields.io/badge/Python-3776AB?style=for-the-badge&logo=python&logoColor=white" alt="Python">
        <img src="https://img.shields.io/badge/C-00599C?style=for-the-badge&logo=c&logoColor=white" alt="C">
        <img src="https://img.shields.io/badge/C%2B%2B-00599C?style=for-the-badge&logo=c%2B%2B&logoColor=white" alt="C++">
        <img src="https://img.shields.io/badge/OCaml-EC6847?style=for-the-badge&logo=ocaml&logoColor=white" alt="OCaml">
        <br>
        <img src="https://img.shields.io/badge/LLVM-white?style=for-the-badge&logo=llvm&logoColor=434343" alt="LLVM">
        <img src="https://img.shields.io/badge/UEFI-0054FF?style=for-the-badge&logo=intel&logoColor=white" alt="UEFI">
        <img src="https://img.shields.io/badge/Git-F05032?style=for-the-badge&logo=git&logoColor=white" alt="Git">
        <br>
        <img src="https://img.shields.io/badge/Ubuntu-E95420?style=for-the-badge&logo=ubuntu&logoColor=white" alt="Ubuntu">
        <img src="https://img.shields.io/badge/Arch_Linux-1793D1?style=for-the-badge&logo=arch-linux&logoColor=white" alt="Arch">
        <img src="https://img.shields.io/badge/Gentoo-54487A?style=for-the-badge&logo=gentoo&logoColor=white" alt="Gentoo">
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Use NixOS</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --text-color: #cdd6f4;
            --accent-color: #89b4fa;
            --subtext: #a6adc8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'JetBrains Mono', 'Fira Code', sans-serif;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }

        .container {
            text-align: center;
            transition: transform 0.3s ease;
        }

        img {
            width: 180px;
            height: auto;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px rgba(137, 180, 250, 0.2));
        }

        img:hover {
            transform: scale(1.1) rotate(180deg);
            filter: drop-shadow(0 0 20px rgba(137, 180, 250, 0.5));
        }

        h1 {
            margin-top: 1.5rem;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #89b4fa, #f5c2e7);
        }

        .subtitle {
            color: var(--subtext);
            font-size: 0.9rem;
            margin-top: -10px;
            opacity: 0.8;
        }

    </style>
</head>

<body>
    <div class="container">
        <img src="../svg/nix-snowflake-colours.svg" alt="NixOS Logo">
        <h1>i use nixos</h1>
        <p class="subtitle">declarative, reliable, and reproducible.</p>
    </div>
</body>

</html>

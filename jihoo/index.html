<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jihoo - Profile</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333;
            --accent-color: #58a6ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; /* 모든 요소를 중앙 정렬 */
        }

        /* 컨테이너 설정 */
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        /* 이미지 기본 반응형 설정 */
        img {
            max-width: 100%;
            height: auto;
            display: inline-block;
            vertical-align: middle;
            margin: 10px 0;
        }

        /* 헤더 스타일 */
        .header-logo {
            width: 100%;
            max-width: 500px;
            margin-bottom: 2rem;
        }

        /* 기술 스택 섹션 (가로 정렬 유지 및 모바일 대응) */
        .tech-stack {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
        }

        .tech-stack img {
            margin: 0;
        }

        /* 카드 형태의 섹션 구분 */
        .section {
            margin: 40px 0;
            padding: 20px;
            border-radius: 10px;
            background: #f6f8fa;
            width: 100%;
        }

        h3 {
            margin-top: 1.5rem;
            font-size: 1.25rem;
            color: #24292f;
        }

        /* 애니메이션 효과 (선택사항) */
        .hover-zoom img {
            transition: transform 0.3s ease;
        }
        .hover-zoom img:hover {
            transform: scale(1.05);
        }

        /* 모바일 최적화: 화면이 작아지면 텍스트 크기 조정 */
        @media (max-width: 600px) {
            body { padding: 10px; }
            h3 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/svg/jihoo.svg" alt="Jihoo Name" class="header-logo">

        <div class="section">
            <div class="tech-stack">
                <a href="https://github.com/jihoo12"><img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/gif/github.gif" alt="GitHub"></a>
            </div>
            <h3>Now i use nixos as daily driver</h3>
        </div>

        <div class="hover-zoom">
            <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/stats.svg" alt="Stats">
            <h3>Jupyter notebook, HTML, and CSS have been excluded. 😀</h3>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 40px 0;">

        <div class="section">
            <div class="hover-zoom">
                <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/lambda_function.png" alt="Lambda">
                <br>
                <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/lambda_function1.png" alt="Lambda 1">
                <br>
                <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/otherimages/HoTT.png" alt="HoTT Theory">
            </div>
            <h3>I am interested in <b>Cubical-Agda</b></h3>
        </div>

        <div class="tech-stack hover-zoom">
            <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/gif/taoturnintocats.gif">
            <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/gif/codethecoolstuff.gif">
            <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/gif/frieren.gif">
            <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/otherimages/wakamo.jpg">
            <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/otherimages/Hakurei_Reimu_Holding_C_Programming_Language.jpg">
            <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/gif/menherachan1.gif">
            <img src="https://raw.githubusercontent.com/jihoo12/jihoo12/refs/heads/main/gif/menherachan.gif">
        </div>
    </div>

</body>
</html>

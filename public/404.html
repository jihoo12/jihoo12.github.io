<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 40px;
        }

        /* Styling the image */
        .error-image {
            width: 100%;
            max-width: 300px; /* Adjust size as needed */
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin: 10px 0;
            color: #2d3436;
        }

        p {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            text-decoration: none;
            background-color: #0984e3;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            display: inline-block;
        }

        .btn:hover {
            background-color: #74b9ff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Your image is placed here -->
        <img src="404.png" alt="404 Error - Page Not Found" class="error-image">
        
        <h1>Lost in Space?</h1>
        <p>We can't seem to find the page you're looking for. It might have been moved or deleted.</p>
        
        <a href="https://jihoo12.github.io" class="btn">Back to Home</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Wooden Springy Image</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5dc;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spring-image {
            width: 500px;
            border-radius: 24px;
            cursor: grab;
            user-select: none;
            z-index: 2;
            touch-action: none;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        #line-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 막대기(나무색) 스타일 */
        #connector-line {
            fill: none;
            stroke: #8B4513;
            stroke-width: 100;
            stroke-linecap: round;
        }

        /* 바닥 고정점 */
        .anchor-point {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 30px;
            background: #5D2906;
            border-radius: 15px 15px 0 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <svg id="line-svg">
            <path id="connector-line" d="" />
        </svg>
        <!-- 이미지 경로는 기존 코드의 경로를 유지하세요 -->
        <img id="wobbleImage" class="spring-image" src="../otherimages/kuroko1.jpg" alt="Springy">
        <div class="anchor-point"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>

    <script>
        gsap.registerPlugin(Draggable);
        const img = document.getElementById("wobbleImage");
        const line = document.getElementById("connector-line");

        // 선의 모양과 이미지의 회전각을 동시에 업데이트하는 함수
        function updateSpring() {
            const imgRect = img.getBoundingClientRect();
            
            // 이미지의 현재 중심점
            const x = imgRect.left + imgRect.width / 2;
            const y = imgRect.top + imgRect.height / 2;
            
            // 바닥 고정점 (화면 하단 중앙)
            const ax = window.innerWidth / 2;
            const ay = window.innerHeight;

            // 1. 막대기(SVG Path) 업데이트
            const cx = (x + ax) / 2;
            const cy = (y + ay) / 2;
            line.setAttribute("d", `M ${x} ${y} Q ${cx} ${cy} ${ax} ${ay}`);

            // 2. 이미지 회전 업데이트 (막대 각도와 일치시키기)
            // atan2는 두 점 사이의 절대적인 각도를 라디안으로 반환합니다.
            const angleRad = Math.atan2(y - ay, x - ax);
            const angleDeg = angleRad * (180 / Math.PI);
            
            // 기본 0도는 3시 방향이므로, 위쪽(12시)을 바라보게 90도를 더해줍니다.
            gsap.set(img, { rotation: angleDeg + 90 });
        }

        // 초기 위치 설정
        updateSpring();

        Draggable.create(img, {
            type: "x,y",
            onDrag: function () {
                updateSpring();
            },
            onRelease: function () {
                // 원위치로 돌아갈 때도 각도가 실시간으로 변하도록 onUpdate에 함수 연결
                gsap.to(this.target, {
                    x: 0,
                    y: 0,
                    duration: 7,
                    ease: "elastic.out(1.5, 0.2)",
                    onUpdate: updateSpring
                });
            }
        });

        // 창 크기가 변할 때 고정점 위치 재계산
        window.addEventListener("resize", updateSpring);
    </script>
</body>

</html>

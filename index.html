<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ my cute space ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fff0f6; /* Soft pastel pink */
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #ff85a2;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.4);
            text-align: center;
            max-width: 80%;
        }

        /* Making the badges look like little stickers */
        img {
            margin: 5px;
            transition: transform 0.3s ease;
            border-radius: 8px;
        }

        img:hover {
            transform: scale(1.2) rotate(5deg); /* Pops out when hovered! */
        }

        .sparkle {
            color: #ffb6c1;
        }
    </style>
</head>

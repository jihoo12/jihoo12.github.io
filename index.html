<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ my cute space ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fff0f6; /* Soft pastel pink */
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #ff85a2;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.4);
            text-align: center;
            max-width: 80%;
        }

        /* Making the badges look like little stickers */
        img {
            margin: 5px;
            transition: transform 0.3s ease;
            border-radius: 8px;
        }

        img:hover {
            transform: scale(1.2) rotate(5deg); /* Pops out when hovered! */
        }

        .code-box {
            display: inline-block;
            background-color: #fff9fa;
            color: #d63384;
            padding: 10px 20px;
            border: 2px dashed #ffb6c1;
            border-radius: 15px;
            margin: 20px 0;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        .footer {
            font-size: 0.9rem;
            color: #ffa4b7;
            margin-top: 15px;
        }

        .sparkle {
            color: #ffb6c1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="sparkle">~ my tech stack ~</h2>
        
        <div class="badges">
            <img src="https://img.shields.io/badge/Rust-black?style=for-the-badge&logo=rust&logoColor=E57324" alt="Rust">
            <img src="https://img.shields.io/badge/Python-3776AB?style=for-the-badge&logo=python&logoColor=white" alt="Python">
            <img src="https://img.shields.io/badge/C-00599C?style=for-the-badge&logo=c&logoColor=white" alt="C">
            <img src="https://img.shields.io/badge/C%2B%2B-00599C?style=for-the-badge&logo=c%2B%2B&logoColor=white" alt="C++">
            <img src="https://img.shields.io/badge/OCaml-EC6847?style=for-the-badge&logo=ocaml&logoColor=white" alt="OCaml">
            <br>
            <img src="https://img.shields.io/badge/LLVM-white?style=for-the-badge&logo=llvm&logoColor=434343" alt="LLVM">
            <img src="https://img.shields.io/badge/UEFI-0054FF?style=for-the-badge&logo=intel&logoColor=white" alt="UEFI">
            <img src="https://img.shields.io/badge/Git-F05032?style=for-the-badge&logo=git&logoColor=white" alt="Git">
            <br>
            <img src="https://img.shields.io/badge/Ubuntu-E95420?style=for-the-badge&logo=ubuntu&logoColor=white" alt="Ubuntu">
            <img src="https://img.shields.io/badge/Arch-1793D1?style=for-the-badge&logo=arch-linux&logoColor=white" alt="Arch">
            <img src="https://img.shields.io/badge/Gentoo-54487A?style=for-the-badge&logo=gentoo&logoColor=white" alt="Gentoo">
            <img src="https://img.shields.io/badge/Fedora-51A2DA?style=for-the-badge&logo=fedora&logoColor=white" alt="Fedora">
            <img src="https://img.shields.io/badge/Debian-A81D33?style=for-the-badge&logo=debian&logoColor=white" alt="Debian">
        </div>

        <div class="code-box">
            55 48 89 e5 c3
        </div>
        <p> btw i currently use ubuntu 24.04 lts </p>
        <p>i'm a beginner</p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clickme</title>
    <style>
        :root {
            --bg-pink: #fff0f3;
            --main-pink: #ffc2d1;
            --dark-pink: #ff85a1;
            --white: #ffffff;
            --shadow: rgba(255, 133, 161, 0.2);
        }

        body {
            background-color: var(--bg-pink);
            background-image: radial-gradient(#ffc2d1 0.8px, transparent 0.8px);
            background-size: 20px 20px;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .sakura-fall {
            position: fixed;
            top: -10%;
            pointer-events: none;
            z-index: 0;
            animation: fall 8s linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 3rem 2rem;
            border-radius: 40px;
            border: 4px solid var(--white);
            outline: 2px solid var(--main-pink);
            box-shadow: 0 15px 35px var(--shadow);
            text-align: center;
            max-width: 350px;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: scale(1.02);
        }

        .container::before {
            content: "🌸";
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            font-size: 0.8rem;
            color: var(--dark-pink);
        }
    </style>
</head>
<body>
    <div class="sakura-fall" style="left:10%; animation-delay:0s">🌸</div>
    <div class="sakura-fall" style="left:30%; animation-delay:2s">🌸</div>
    <div class="sakura-fall" style="left:50%; animation-delay:4s">✨</div>
    <div class="sakura-fall" style="left:70%; animation-delay:1s">🌸</div>
    <div class="sakura-fall" style="left:90%; animation-delay:3s">🎀</div>
    <div class="container">
        i'm a beginner
    </div>
</body>
</html>

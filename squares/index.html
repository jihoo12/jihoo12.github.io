<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-Performance Squares</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // 설정값
    const numSquares = 25; // 숫자를 더 늘려도 부드럽습니다.
    const gridSize = 80;    // 격자 크기

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Square {
        constructor(id) {
            this.id = id;
            this.size = Math.random() * 20 + 15;
            this.x = Math.random() * (canvas.width - this.size);
            this.y = Math.random() * (canvas.height - this.size);
            this.dx = (Math.random() - 0.5) * 5;
            this.dy = (Math.random() - 0.5) * 5;
            this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
        }

        update() {
            // 벽 충돌 (단순화 및 보정)
            if (this.x < 0) { this.x = 0; this.dx *= -1; }
            else if (this.x + this.size > canvas.width) { this.x = canvas.width - this.size; this.dx *= -1; }
            
            if (this.y < 0) { this.y = 0; this.dy *= -1; }
            else if (this.y + this.size > canvas.height) { this.y = canvas.height - this.size; this.dy *= -1; }

            this.x += this.dx;
            this.y += this.dy;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    const squares = Array.from({ length: numSquares }, (_, i) => new Square(i));

    // 최적화된 그리드 시스템용 변수 (재사용)
    let grid = new Map();

    function checkCollisions() {
        grid.clear(); // 매번 객체를 생성하지 않고 Map을 비워서 재사용

        // 1. 격자 등록 (문자열 생성 방식을 비트 연산이나 숫자로 대체 가능하나, Map이 직관적)
        for (let i = 0; i < numSquares; i++) {
            const s = squares[i];
            const gx = (s.x / gridSize) | 0; // Math.floor 대신 비트 연산으로 고속 처리
            const gy = (s.y / gridSize) | 0;
            const key = (gx << 16) | gy; // 정수 키 사용 (문자열 생성을 막아 GC 부하 감소)

            if (!grid.has(key)) grid.set(key, []);
            grid.get(key).push(s);
        }

        // 2. 인접 격자 검사
        for (const [key, cellSquares] of grid) {
            const gx = key >> 16;
            const gy = key & 0xFFFF;

            // 주변 9칸 검사 (오른쪽과 아래쪽 방향 위주로 중복 방지 설계도 가능하지만 단순화)
            for (let x = gx - 1; x <= gx + 1; x++) {
                for (let y = gy - 1; y <= gy + 1; y++) {
                    const neighborKey = (x << 16) | y;
                    const neighbors = grid.get(neighborKey);
                    
                    if (!neighbors) continue;

                    for (let i = 0; i < cellSquares.length; i++) {
                        const s1 = cellSquares[i];
                        for (let j = 0; j < neighbors.length; j++) {
                            const s2 = neighbors[j];
                            
                            if (s1.id < s2.id) {
                                resolveCollision(s1, s2);
                            }
                        }
                    }
                }
            }
        }
    }

    function resolveCollision(s1, s2) {
        // AABB 충돌 판정
        if (s1.x < s2.x + s2.size && s1.x + s1.size > s2.x &&
            s1.y < s2.y + s2.size && s1.y + s1.size > s2.y) {
            
            // 단순 물리 반사
            [s1.dx, s2.dx] = [s2.dx, s1.dx];
            [s1.dy, s2.dy] = [s2.dy, s1.dy];

            // 겹침 방지 (포지션 보정)
            const overlapX = (s1.size + s2.size) / 2 - Math.abs((s1.x + s1.size / 2) - (s2.x + s2.size / 2));
            const overlapY = (s1.size + s2.size) / 2 - Math.abs((s1.y + s1.size / 2) - (s2.y + s2.size / 2));

            if (overlapX < overlapY) {
                const shift = s1.x < s2.x ? -1 : 1;
                s1.x += shift; s2.x -= shift;
            } else {
                const shift = s1.y < s2.y ? -1 : 1;
                s1.y += shift; s2.y -= shift;
            }
        }
    }

    function animate() {
        // 잔상 효과를 주면서 배경 채우기
        ctx.fillStyle = '#1a1a1a'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        checkCollisions();
        
        for (let i = 0; i < numSquares; i++) {
            squares[i].update();
            squares[i].draw();
        }

        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>

<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 435 50' width='435px' height='50px'>
  <defs>
    <linearGradient id='dynamicGrad' x1='0%' y1='0%' x2='100%' y2='0%'>
      <stop offset='0%' stop-color='#ea76cb'>
        <animate attributeName="stop-color" values="#ea76cb;#6e8efb;#ea76cb" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset='100%' stop-color='#6e8efb'>
        <animate attributeName="stop-color" values="#6e8efb;#ea76cb;#6e8efb" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <text font-family='monospace' font-weight='black' fill='url(#dynamicGrad)' font-size='32' x='0' y='35' style='letter-spacing: 2px; text-transform: uppercase;'>
    Jihoo
  </text>
</svg>
